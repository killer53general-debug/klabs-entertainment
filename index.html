<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>K-Labs Entertainment</title>

<style>
body {
  background: #050505;
  color: #eaeaea;
  font-family: monospace;
  text-align: center;
  overflow-x: hidden;
}

nav {
  padding: 20px;
  position: fixed;
  width: 100%;
  background: rgba(0,0,0,0.7);
}

.hero {
  margin-top: 150px;
}

.glitch {
  font-size: 40px;
  position: relative;
  animation: flicker 2s infinite;
}

@keyframes flicker {
  0%, 100% {opacity: 1;}
  50% {opacity: 0.7;}
}

section {
  padding: 80px 20px;
}

input {
  background: black;
  color: white;
  border: 1px solid #333;
  padding: 8px;
}

button {
  padding: 8px 20px;
  background: transparent;
  border: 1px solid white;
  color: white;
  cursor: pointer;
}

.hiddenPage {
  display: none;
  margin-top: 50px;
}

#glitchScreen {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
}

</style>
</head>

<body>

<div id="glitchScreen"></div>

<nav>K-LABS // SYSTEM ONLINE</nav>

<div class="hero">
  <h1 class="glitch" id="title">K-LABS ENTERTAINMENT</h1>
  <p id="subtitle">Sistema estable</p>
</div>

<section>
  <h3>ACCESO</h3>
  <p>Introduce el código</p>

  <input type="text" id="code">
  <br><br>
  <button onclick="checkCode()">Entrar</button>

  <p id="msg"></p>
</section>

<section id="secret" class="hiddenPage">
  <h3>ARCHIVO DESBLOQUEADO</h3>
  <p id="secretText">Cargando datos...</p>
</section>

<script>

// CAMBIOS DE TEXTO AUTOMÁTICOS
setInterval(() => {
  let texts = [
    "Sistema estable",
    "Error detectado",
    "Reconectando...",
    "No hay nadie aquí",
    "¿Quién está usando esto?"
  ];
  document.getElementById("subtitle").innerText =
    texts[Math.floor(Math.random()*texts.length)];
}, 4000);

// GLITCH PANTALLA
setInterval(() => {
  let glitch = document.getElementById("glitchScreen");
  glitch.style.opacity = 0.2;
  setTimeout(()=> glitch.style.opacity = 0, 100);
}, 7000);

// CAMBIO DE TÍTULO RARO
setInterval(() => {
  let title = document.getElementById("title");
  title.innerText = "K̴-L̷A̸B̴S̶";
  setTimeout(()=> title.innerText = "K-LABS ENTERTAINMENT", 200);
}, 6000);

// CÓDIGO
function checkCode() {
  let code = document.getElementById("code").value;

  if(code === "1053") {
    document.getElementById("msg").innerText = "Acceso concedido...";
    document.getElementById("secret").style.display = "block";

    revealText();
  } else {
    document.getElementById("msg").innerText = "Acceso denegado";
  }
}

// TEXTO QUE SE ESCRIBE SOLO
function revealText() {
  let text = "Registro recuperado: sujeto activo. No responde. Sigue observando.";
  let i = 0;

  let interval = setInterval(() => {
    document.getElementById("secretText").innerText += text[i];
    i++;
    if(i >= text.length) clearInterval(interval);
  }, 50);
}

</script>

</body>
</html>
