<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>K-Labs Entertainment</title>

<style>
body {
  background: #050505;
  color: #eaeaea;
  font-family: monospace;
  text-align: center;
  margin: 0;
  overflow-x: hidden;
  letter-spacing: 1px;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  z-index: 9999;
}

nav {
  padding: 15px;
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 100;
}

.hero {
  margin-top: 120px;
}

h1 {
  font-size: 36px;
  letter-spacing: 4px;
}

section {
  padding: 80px 20px;
  border-bottom: 1px solid #222;
  background: rgba(255,255,255,0.02);
  margin: 20px;
  border-radius: 10px;
}

.hidden {
  display: none;
}

#status {
  color: #888;
}

body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif');
  opacity: 0.03;
  pointer-events: none;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro"><span id="introText"></span></div>

<nav>K-LABS // INTERNAL NETWORK</nav>

<div class="hero">
  <h1 id="title">K-LABS ENTERTAINMENT</h1>
  <p id="status">Sistema estable</p>
</div>

<section>
  <h3>SOBRE K-LABS</h3>
  <p>Código interno: <strong>7</strong></p>
</section>

<section>
  <h3>EXPERIMENTOS</h3>
  <p>1053 activo // Código residual: <strong>2</strong></p>
</section>

<!-- SOLO UN FILES -->
<section id="files" class="hidden">
  <h3>ARCHIVOS DESBLOQUEADOS</h3>
  <a href="log_01.html">► log_01.html</a><br>
  <a href="log_02.html">► log_02.html</a>
</section>

<section>
  <h3>ACCESO</h3>
  <input id="code">
  <button onclick="checkCode()">Entrar</button>
  <p id="msg"></p>
</section>

<section id="lore" class="hidden">
  <h3>REGISTRO</h3>
  <p id="log"></p>
</section>

<script>

// INTRO
let text = "Has vuelto...";
let i = 0;
function intro(){
  if(i < text.length){
    introText.innerHTML += text[i++];
    setTimeout(intro, 100);
  } else {
    setTimeout(()=> introDiv.style.display="none", 1500);
  }
}
let introDiv = document.getElementById("intro");
let introText = document.getElementById("introText");
intro();

// USUARIO
let username = prompt("Identificación requerida:");
let attempts = 0;

// ESTADOS
let states = [
 "Sistema estable",
 "Sin anomalías",
 "Señal inconsistente",
 "Actividad no registrada",
 "Protocolo 1053 activo"
];

setInterval(()=>{
 status.innerText = states[Math.floor(Math.random()*states.length)];
},4000);

// GLITCH TÍTULO
setInterval(()=>{
 let title = document.getElementById("title");
 title.innerText = "K̷-L̸A̶B̷S̴";
 setTimeout(()=> title.innerText="K-LABS ENTERTAINMENT",150);
},6000);

// PARPADEO SUAVE
setInterval(()=>{
 if(Math.random()<0.08){
  document.body.style.opacity=0.2;
  setTimeout(()=>document.body.style.opacity=1,80);
 }
},2000);

// CÓDIGOS
function checkCode(){
 let code = document.getElementById("code").value;
 attempts++;

 if(code==="1053"){
  msg.innerText="Acceso parcial concedido";
  lore.style.display="block";
  files.style.display="block";
  showLore();
 }
 else if(code==="723"){
  msg.innerText="Acceso total concedido...";
  setTimeout(()=> alert("Has desbloqueado algo que no deberías."),2000);
 }
 else if(code==="777"){
  document.body.style.background="black";
  alert("ERROR CRÍTICO");
 }
 else if(code==="0000"){
  msg.innerText="...no uses ese código";
 }
 else{
  msg.innerText= attempts>3 ? "Te estamos observando." : "Acceso denegado";
 }
}

// LORE
function showLore(){
 let logs=[
  "[LOG] Actividad detectada",
  "[LOG] Movimiento interno",
  "[LOG] Sigue activo"
 ];
 let i=0;
 let interval=setInterval(()=>{
  log.innerText+=logs[i]+"\n";
  i++;
  if(i>=logs.length) clearInterval(interval);
 },1000);
}

// SONIDO (MEJORADO)
let ambient = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b7c58.mp3");
ambient.loop = true;
document.addEventListener("click", ()=> ambient.play(), { once:true });

// MEMORIA
if(localStorage.getItem("visited")){
 setTimeout(()=> status.innerText="Te recuerdo.",3000);
}
localStorage.setItem("visited",true);

</script>

</body>
</html>
