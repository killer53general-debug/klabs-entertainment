<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>K-Labs Entertainment</title>

<style>
body {
  background: #050505;
  color: #eaeaea;
  font-family: monospace;
  text-align: center;
}

nav {
  padding: 15px;
  position: fixed;
  width: 100%;
  background: rgba(0,0,0,0.7);
}

.hero {
  margin-top: 120px;
}

h1 {
  font-size: 36px;
  letter-spacing: 4px;
}

section {
  padding: 80px 20px;
}

input {
  background: black;
  color: white;
  border: 1px solid #333;
  padding: 8px;
}

button {
  padding: 8px 20px;
  background: transparent;
  border: 1px solid white;
  color: white;
  cursor: pointer;
}

.hidden {
  display: none;
  margin-top: 40px;
  color: #aaa;
}

.glitchText {
  animation: flicker 2s infinite;
}

@keyframes flicker {
  0%,100% {opacity:1;}
  50% {opacity:0.6;}
}

</style>
</head>

<body>

<nav>K-LABS // INTERNAL NETWORK</nav>

<div class="hero">
  <h1 id="title">K-LABS ENTERTAINMENT</h1>
  <p id="status">Sistema estable</p>
</div>

<section>
  <h3>ACCESO RESTRINGIDO</h3>
  <p>Se requiere código de autorización</p>

  <input type="text" id="code">
  <br><br>
  <button onclick="checkCode()">Entrar</button>

  <p id="msg"></p>
</section>

<section id="lore" class="hidden">
  <h3>REGISTRO PARCIAL</h3>
  <p id="log"></p>
</section>

<script>

// FRASES AMBIGUAS
const states = [
  "Sistema estable",
  "Sin anomalías",
  "Latencia detectada",
  "Señal inconsistente",
  "Actividad no registrada",
  "No debería estar activo"
];

setInterval(()=>{
  document.getElementById("status").innerText =
    states[Math.floor(Math.random()*states.length)];
}, 4000);

// PEQUEÑOS GLITCHES
setInterval(()=>{
  let title = document.getElementById("title");
  title.innerText = "K̷-L̸A̶B̷S̴";
  setTimeout(()=> title.innerText="K-LABS ENTERTAINMENT",150);
}, 6000);

// CÓDIGO
function checkCode(){
  let code = document.getElementById("code").value;

  if(code === "1053"){
    document.getElementById("msg").innerText = "Acceso parcial concedido";
    document.getElementById("lore").style.display = "block";
    showLore();
  } else {
    document.getElementById("msg").innerText = "Acceso denegado";
  }
}

// LORE SUGERIDO (NO EXPLICA TODO)
function showLore(){
  let logs = [
    "Registro incompleto recuperado...",
    "El sujeto dejó de responder antes del cierre.",
    "No se confirmó la desconexión.",
    "El protocolo fue ignorado.",
    "No hay registro de salida.",
    "...pero algo sigue ejecutándose."
  ];

  let i = 0;

  let interval = setInterval(()=>{
    document.getElementById("log").innerText += logs[i] + "\n";
    i++;
    if(i >= logs.length) clearInterval(interval);
  }, 1200);
}

</script>

</body>
</html>
